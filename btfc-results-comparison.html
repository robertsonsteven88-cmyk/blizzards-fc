<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BTFC Results Comparison</title>
  <style>
    :root{--blue:#1e3a8a;--bg:#f4f6fa;--card:#fff;--line:#e6e6e6;--muted:#666;--shadow:0 2px 10px rgba(0,0,0,.06);--radius:14px;}
    body{font-family:Arial,sans-serif;background:var(--bg);margin:0;color:#111;}
    header{background:var(--blue);color:#fff;padding:16px;}
    header h1{margin:0;font-size:20px;}
    nav{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
    nav a{color:#fff;text-decoration:underline;font-size:14px}
    .wrap{max-width:1200px;margin:0 auto;padding:14px}
    .card{background:var(--card);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
    .muted{color:var(--muted);font-size:13px}
    table{width:100%;border-collapse:collapse}
    th{background:var(--blue);color:#fff;text-align:left;padding:10px;font-size:13px}
    td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;font-size:14px}
    tr:last-child td{border-bottom:none}
    .team{font-weight:bold}
    .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;background:#eef2ff;margin:2px 6px 2px 0}
    .scrollX{overflow-x:auto}
  </style>
</head>
<body>
  <header>
    <h1>BTFC Results Comparison</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="results.html">Results</a>
      <a href="btfc-results-comparison.html">BTFC Results Comparison</a>
    </nav>
  </header>

  <div class="wrap">
    <div class="card">
      <div class="muted" style="margin-bottom:10px;">
        Edit <code>btfc_comparison.csv</code> to update this page.
      </div>

      <div class="scrollX">
        <table>
          <thead>
            <tr>
              <th style="width:28%;">Opposition</th>
              <th>Hurricanes</th>
              <th>Blizzards</th>
              <th>Cyclones</th>
            </tr>
          </thead>
          <tbody id="body"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  function parseCSV(text){
    const rows=[]; let i=0, field="", row=[], inQuotes=false;
    while(i<text.length){
      const c=text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field+='"'; i++; }
          else inQuotes=false;
        } else field+=c;
      } else {
        if(c === '"') inQuotes=true;
        else if(c === ','){ row.push(field); field=""; }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=""; }
        else if(c !== '\r') field+=c;
      }
      i++;
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows;
  }

  function pills(str){
    const s=(str||"").trim();
    if(!s) return `<span class="muted">—</span>`;
    // expects like: "L 1-3; W 5-1"
    return s.split(';').map(x=>x.trim()).filter(Boolean).map(x=>`<span class="pill">${x}</span>`).join('');
  }

  (async function(){
    const res = await fetch('btfc_comparison.csv', {cache:'no-store'});
    const text = await res.text();
    const rows = parseCSV(text);
    const header = rows[0].map(h=>h.trim());
    const idx = (name)=> header.indexOf(name);

    const tb = document.getElementById('body');
    tb.innerHTML="";

    for(let r=1;r<rows.length;r++){
      const opp = (rows[r][idx("Opposition")]||"").trim();
      if(!opp) continue;
      const h = (rows[r][idx("Hurricanes")]||"").trim();
      const b = (rows[r][idx("Blizzards")]||"").trim();
      const c = (rows[r][idx("Cyclones")]||"").trim();

      const tr=document.createElement('tr');
      tr.innerHTML = `
        <td class="team">${opp}</td>
        <td>${pills(h)}</td>
        <td>${pills(b)}</td>
        <td>${pills(c)}</td>
      `;
      tb.appendChild(tr);
    }
  })();
</script>
</body>
</html>
